<svg viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .dih-text { font-family: Arial, sans-serif; font-weight: bold; font-size: 48px; fill: #D4AF37; }
      .world-circle { fill: none; stroke: #D4AF37; stroke-width: 2; }
      .world-continent { fill: #D4AF37; }
    </style>
  </defs>
  
  <!-- World Icon -->
  <circle cx="30" cy="40" r="25" class="world-circle"/>
  <circle cx="30" cy="40" r="20" class="world-circle" stroke-width="1" opacity="0.5"/>
  
  <!-- Simplified continents -->
  <path d="M 20 30 Q 25 25 32 28 Q 35 30 33 38 Q 28 40 20 38 Z" class="world-continent"/>
  <path d="M 35 45 Q 40 42 45 48 Q 43 52 38 50 Z" class="world-continent"/>
  
  <!-- Text: DIH HUB -->
  <text x="65" y="55" class="dih-text">DIH HUB</text>
</svg>