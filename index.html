<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DIH HUB | Maintenance</title>

<!-- FAVICON (title icon) -->
<link rel="icon" type="image/png" href="logo.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#2b2200,#111,#000);
color:#fff;
overflow:hidden;
}

.card{
text-align:center;
padding:50px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border:1px solid rgba(255,215,0,0.2);
border-radius:25px;
width:90%;
max-width:700px;
box-shadow:0 0 40px rgba(255,215,0,0.1);
}

.logo img{
width:180px;
margin-bottom:20px;
filter:drop-shadow(0 0 20px rgba(255,215,0,0.4));
}

h1{
font-size:38px;
margin-bottom:10px;
}

p{
color:#ccc;
margin-bottom:25px;
line-height:1.6;
}

.progress{
width:100%;
height:10px;
background:#222;
border-radius:50px;
overflow:hidden;
}

.progress span{
display:block;
height:100%;
width:60%;
background:linear-gradient(90deg,#FFD700,#ffcc33);
animation:load 2.5s infinite;
}

@keyframes load{
0%{width:30%;}
50%{width:80%;}
100%{width:30%;}
}

.status{
margin-top:10px;
color:#FFD700;
font-weight:600;
}

.footer{
margin-top:25px;
font-size:13px;
color:#777;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">
<img src="logo.png" alt="DIH Logo">
</div>

<h1>Website Under Maintenance</h1>

<p>
We are currently updating DIH HUB for better speed, security and performance.
Please check back soon.
</p>

<div class="progress">
<span></span>
</div>

<div class="status">Updating System...</div>

<div class="footer">
© 2026 DIH HUB. All Rights Reserved.
</div>

</div>

</body>
</html>
